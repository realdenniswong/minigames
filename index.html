<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>Dennis Mini Games</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">HTML5 offline arcade</p>
          <h1>Dennis Mini Games</h1>
        </div>
        <div class="status-pill">Bundle library</div>
      </header>

      <section class="game-menu" id="gameMenu" aria-labelledby="library-title">
        <div class="library-heading">
          <div>
            <p class="eyebrow">choose a game</p>
            <h2 id="library-title">Game Library</h2>
          </div>
        </div>
        <div class="game-list" id="gameList"></div>
      </section>

      <section class="game-stage" id="gameStage" hidden>
        <div class="stage-toolbar">
          <button type="button" id="backToMenu">Back</button>
          <strong id="stageTitle">Game</strong>
          <button type="button" id="fullscreenGame">Fullscreen</button>
        </div>
        <iframe
          id="gameFrame"
          class="game-frame"
          title="Selected game"
          allow="fullscreen"
        ></iframe>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
