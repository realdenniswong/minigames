<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#1c8f78" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Mini Games" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Brain Training</title>
    <link rel="manifest" href="../../manifest.webmanifest" />
    <link rel="apple-touch-icon" href="../../icon.svg" />
    <link rel="stylesheet" href="../shared/shell.css" />
    <link rel="stylesheet" href="styles.css?v=7" />
  </head>
  <body>
    <main class="game-shell">
      <header class="panel-heading">
        <a class="nav-button" href="../../index.html">Library</a>
        <div class="title-block">
          <p class="eyebrow">daily drills</p>
          <h1>Brain Training</h1>
        </div>
      </header>

      <section class="game-layout game-screen brain-screen">
        <div class="mode-picker-area">
          <button
            class="mode-picker-button"
            type="button"
            id="modePickerButton"
            aria-haspopup="dialog"
            aria-expanded="false"
          >
            <span>
              <span class="mode-picker-label">Mode</span>
              <strong id="modePickerCurrent">Math Sprint</strong>
            </span>
            <span class="mode-picker-arrow" aria-hidden="true"></span>
          </button>
          <div class="mode-picker-box" id="modePicker" role="dialog" aria-label="Choose game mode" hidden>
            <div class="mode-picker-head">
              <strong>Choose mode</strong>
              <button type="button" id="closeModePicker" aria-label="Close mode picker">Close</button>
            </div>
            <div class="mode-list" role="listbox" aria-label="Brain Training modes">
              <button class="mode-button active" type="button" data-mode="math" aria-selected="true">
                Math Sprint
              </button>
              <button class="mode-button" type="button" data-mode="color" aria-selected="false">
                Word Color
              </button>
              <button class="mode-button" type="button" data-mode="reaction" aria-selected="false">
                Cowboy Duel
              </button>
              <button class="mode-button" type="button" data-mode="simon" aria-selected="false">
                Simon Said
              </button>
            </div>
          </div>
        </div>

        <aside class="side-panel">
          <div class="math-options" id="mathOptions">
            <label class="select-control">
              <span>Difficulty</span>
              <select id="mathDifficulty">
                <option value="easy">Easy</option>
                <option value="medium">Medium</option>
                <option value="hard">Hard</option>
              </select>
            </label>
          </div>
          <div class="reaction-options" id="reactionOptions" hidden>
            <label class="select-control">
              <span>Difficulty</span>
              <select id="reactionDifficulty">
                <option value="easy">Easy</option>
                <option value="medium">Medium</option>
                <option value="hard">Hard</option>
              </select>
            </label>
          </div>
          <div class="screen-actions">
            <button class="primary-button" type="button" id="startBrain">Start</button>
            <button type="button" id="resetBrain">Reset</button>
          </div>
          <div class="stat-grid">
            <div>
              <span id="scoreLabel">Score</span>
              <strong id="brainScore">0</strong>
            </div>
            <div>
              <span>Best</span>
              <strong id="brainBest">0</strong>
            </div>
            <div>
              <span id="roundLabel">Round</span>
              <strong id="brainRound">0/10</strong>
            </div>
            <div>
              <span id="timeLabel">Time</span>
              <strong id="brainTime">0.0s</strong>
            </div>
          </div>
          <p class="game-message" id="brainMessage">Pick a drill, then press Start.</p>
        </aside>

        <div class="brain-stage">
          <div class="prompt-card">
            <p class="prompt-kicker" id="promptKicker">Math Sprint</p>
            <div class="prompt-text" id="brainPrompt">Ready?</div>
          </div>
          <div class="brain-controls" id="brainControls"></div>
        </div>
      </section>
    </main>
    <script src="game.js?v=9"></script>
  </body>
</html>
