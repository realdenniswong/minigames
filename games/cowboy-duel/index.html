<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#1c8f78" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Mini Games" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Cowboy Duel</title>
    <link rel="manifest" href="../../manifest.webmanifest" />
    <link rel="apple-touch-icon" href="../../icon.svg" />
    <link rel="stylesheet" href="../shared/shell.css" />
    <link rel="stylesheet" href="../brain/styles.css?v=37" />
  </head>
  <body data-fixed-mode="reaction">
    <main class="game-shell">
      <header class="panel-heading">
        <a class="nav-button" href="../../index.html">Library</a>
        <div class="title-block">
          <p class="eyebrow">draw timing</p>
          <h1>Cowboy Duel</h1>
        </div>
      </header>

      <section class="game-layout game-screen brain-screen">
        <aside class="side-panel">
          <div class="reaction-options" id="reactionOptions">
            <label class="select-control">
              <span>Difficulty</span>
              <select id="reactionDifficulty">
                <option value="easy">Easy</option>
                <option value="medium">Medium</option>
                <option value="hard">Hard</option>
              </select>
            </label>
          </div>
          <div class="screen-actions">
            <button class="primary-button" type="button" id="startBrain">Start</button>
            <button type="button" id="resetBrain">Reset</button>
          </div>
          <div class="stat-grid">
            <div><span id="scoreLabel">Score</span><strong id="brainScore">0</strong></div>
            <div><span>Best</span><strong id="brainBest">0</strong></div>
            <div><span id="roundLabel">Round</span><strong id="brainRound">0/5</strong></div>
            <div><span id="timeLabel">Shot</span><strong id="brainTime">-</strong></div>
          </div>
          <p class="game-message" id="brainMessage">Pick difficulty. Press duel.</p>
        </aside>

        <div class="brain-stage">
          <div class="prompt-card">
            <p class="prompt-kicker" id="promptKicker">Cowboy Duel</p>
            <div class="prompt-text" id="brainPrompt">Ready?</div>
          </div>
          <div class="brain-controls" id="brainControls"></div>
        </div>
      </section>
    </main>
    <script src="../brain/game.js?v=32"></script>
  </body>
</html>
