<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#1c8f78" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Mini Games" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Flappy Bird</title>
    <link rel="manifest" href="../../manifest.webmanifest" />
    <link rel="apple-touch-icon" href="../../icon.svg" />
    <link rel="stylesheet" href="../shared/shell.css" />
    <link rel="stylesheet" href="styles.css?v=5" />
  </head>
  <body>
    <main class="game-shell">
      <header class="panel-heading">
        <a class="nav-button" href="../../index.html">Library</a>
        <div class="title-block">
          <p class="eyebrow">tap timing</p>
          <h1>Flappy Bird</h1>
        </div>
      </header>

      <section class="game-layout">
        <div class="game-screen flappy-screen">
          <canvas id="flappyCanvas" width="432" height="576" aria-label="Flappy game canvas"></canvas>
          <aside class="side-panel screen-panel">
            <div class="screen-actions">
              <button class="primary-button" type="button" id="resetFlappy">Reset</button>
            </div>
            <div class="stat-grid">
              <div>
                <span>Score</span>
                <strong id="flappyScore">0</strong>
              </div>
              <div>
                <span>Best</span>
                <strong id="flappyBest">0</strong>
              </div>
            </div>
            <p class="game-message" id="flappyMessage">Tap the game or press Space to start.</p>
          </aside>
        </div>
      </section>
    </main>
    <script src="game.js?v=1"></script>
  </body>
</html>
