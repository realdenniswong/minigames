<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>Flappy Bird Style</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <header class="panel-heading">
        <a class="nav-button" href="../../index.html">Library</a>
        <div class="title-block">
          <p class="eyebrow">tap timing</p>
          <h1>Flappy Bird Style</h1>
        </div>
        <div class="control-row">
          <button class="primary-button" type="button" id="startFlappy">Start</button>
          <button type="button" id="resetFlappy">Reset</button>
        </div>
      </header>

      <section class="game-layout">
        <canvas id="flappyCanvas" width="432" height="576" aria-label="Flappy game canvas"></canvas>
        <aside class="side-panel">
          <div class="stat-grid">
            <div>
              <span>Score</span>
              <strong id="flappyScore">0</strong>
            </div>
            <div>
              <span>Best</span>
              <strong id="flappyBest">0</strong>
            </div>
          </div>
          <p class="game-message" id="flappyMessage">Press Start, then tap the game to flap.</p>
        </aside>
      </section>
    </main>
    <script src="game.js"></script>
  </body>
</html>
