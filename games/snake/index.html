<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#1c8f78" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Mini Games" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Snake</title>
    <link rel="manifest" href="../../manifest.webmanifest" />
    <link rel="apple-touch-icon" href="../../icon.svg" />
    <link rel="stylesheet" href="../shared/shell.css?v=1" />
    <link rel="stylesheet" href="styles.css?v=4" />
  </head>
  <body>
    <main class="game-shell">
      <header class="panel-heading">
        <a class="nav-button" href="../../index.html">Library</a>
        <div class="title-block">
          <p class="eyebrow">maze chase</p>
          <h1>Snake</h1>
        </div>
      </header>

      <section class="game-layout">
        <div class="game-screen snake-screen">
          <canvas id="snakeCanvas" width="1000" height="500" aria-label="Snake game board"></canvas>
          <aside class="side-panel">
            <div class="screen-actions">
              <button class="primary-button" type="button" id="newSnake">New map</button>
              <button type="button" id="restartSnake" hidden>Restart</button>
            </div>
            <div class="stat-grid">
              <div>
                <span>Score</span>
                <strong id="snakeScore">0</strong>
              </div>
              <div>
                <span>Best</span>
                <strong id="snakeBest">0</strong>
              </div>
              <div>
                <span>Seed</span>
                <strong id="snakeSeed">0</strong>
              </div>
            </div>
            <div class="d-pad d-pad-left" aria-label="Snake left direction controls">
              <button type="button" data-direction="left" aria-label="Move left">←</button>
              <button type="button" data-direction="up" aria-label="Move up">↑</button>
              <button type="button" data-direction="down" aria-label="Move down">↓</button>
            </div>
            <div class="d-pad d-pad-right" aria-label="Snake right direction controls">
              <button type="button" data-direction="up" aria-label="Move up">↑</button>
              <button type="button" data-direction="right" aria-label="Move right">→</button>
              <button type="button" data-direction="down" aria-label="Move down">↓</button>
            </div>
            <div class="d-pad d-pad-mobile" aria-label="Snake direction controls">
              <button type="button" data-direction="up" aria-label="Move up">↑</button>
              <button type="button" data-direction="left" aria-label="Move left">←</button>
              <button type="button" data-direction="right" aria-label="Move right">→</button>
              <button type="button" data-direction="down" aria-label="Move down">↓</button>
            </div>
            <p class="game-message" id="snakeMessage">Tap an arrow or press an arrow key to start.</p>
          </aside>
        </div>
      </section>
    </main>
    <script src="game.js"></script>
    <script src="../shared/share.js?v=1"></script>
  </body>
</html>
