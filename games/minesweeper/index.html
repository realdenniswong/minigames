<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#1c8f78" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Mini Games" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Minesweeper</title>
    <link rel="manifest" href="../../manifest.webmanifest" />
    <link rel="apple-touch-icon" href="../../icon.svg" />
    <link rel="stylesheet" href="styles.css?v=4" />
    <link rel="stylesheet" href="../shared/shell.css?v=1" />
  </head>
  <body>
    <main class="game-shell">
      <header class="panel-heading">
        <a class="nav-button" href="../../index.html">Library</a>
        <div class="title-block">
          <p class="eyebrow">logic and luck</p>
          <h1>Minesweeper</h1>
        </div>
      </header>

      <section class="game-layout game-screen">
        <div class="play-layout">
          <aside class="side-panel">
            <div class="screen-controls">
              <label class="select-control">
                <span>Size</span>
                <select id="mineDifficulty">
                  <option value="easy">Easy 9x9</option>
                  <option value="medium">Medium 12x12</option>
                  <option value="hard">Hard 16x16</option>
                </select>
              </label>
              <button class="primary-button" type="button" id="newMineGame">Start</button>
            </div>
            <div class="stat-grid">
              <div>
                <span>Mines</span>
                <strong id="mineCount">10</strong>
              </div>
              <div>
                <span>Flags</span>
                <strong id="flagCount">0</strong>
              </div>
              <div>
                <span>Time</span>
                <strong id="mineTimer">0</strong>
              </div>
            </div>
            <div class="mode-toggle" role="group" aria-label="Mine action mode">
              <button class="mode-button active" type="button" data-mine-mode="reveal">Reveal</button>
              <button class="mode-button" type="button" data-mine-mode="flag">Flag</button>
            </div>
            <p class="game-message" id="mineMessage">Pick a tile. First move is safe.</p>
          </aside>
          <div class="board-wrap">
            <div class="mine-board" id="mineBoard" aria-label="Minesweeper board"></div>
          </div>
        </div>
      </section>
    </main>
    <script src="game.js"></script>
    <script src="../shared/share.js?v=3"></script>
  </body>
</html>
