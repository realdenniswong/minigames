<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#1c8f78" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Mini Games" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Math Sprint</title>
    <link rel="manifest" href="../../manifest.webmanifest" />
    <link rel="apple-touch-icon" href="../../icon.svg" />
    <link rel="stylesheet" href="../shared/shell.css" />
    <link rel="stylesheet" href="../brain/styles.css?v=28" />
  </head>
  <body data-fixed-mode="math">
    <main class="game-shell">
      <header class="panel-heading">
        <a class="nav-button" href="../../index.html">Library</a>
        <div class="title-block">
          <p class="eyebrow">quick calculations</p>
          <h1>Math Sprint</h1>
        </div>
      </header>

      <section class="game-layout game-screen brain-screen">
        <aside class="side-panel">
          <div class="math-options" id="mathOptions">
            <label class="select-control">
              <span>Difficulty</span>
              <select id="mathDifficulty">
                <option value="easy">Easy</option>
                <option value="medium">Medium</option>
                <option value="hard">Hard</option>
              </select>
            </label>
            <label class="select-control">
              <span>Questions</span>
              <select id="mathQuestionCount">
                <option value="10">10</option>
                <option value="20">20</option>
                <option value="50">50</option>
                <option value="100">100</option>
                <option value="custom">Custom</option>
              </select>
            </label>
            <div class="custom-count-control" id="mathCustomCountWrap" hidden>
              <span>Custom</span>
              <div class="custom-count-stepper" role="group" aria-label="Custom question count">
                <button class="count-step-button" type="button" id="mathCustomCountDown" aria-label="Decrease questions">
                  -
                </button>
                <input
                  id="mathCustomCount"
                  type="number"
                  min="1"
                  max="999"
                  step="1"
                  inputmode="numeric"
                  value="10"
                  aria-label="Custom question count"
                />
                <button class="count-step-button" type="button" id="mathCustomCountUp" aria-label="Increase questions">
                  +
                </button>
              </div>
            </div>
          </div>
          <div class="screen-actions">
            <button class="primary-button" type="button" id="startBrain">Start</button>
            <button type="button" id="resetBrain">Reset</button>
          </div>
          <div class="stat-grid">
            <div><span id="scoreLabel">Score</span><strong id="brainScore">0</strong></div>
            <div><span>Best</span><strong id="brainBest">0</strong></div>
            <div><span id="roundLabel">Round</span><strong id="brainRound">0/10</strong></div>
            <div><span id="timeLabel">Time</span><strong id="brainTime">0.0s</strong></div>
          </div>
          <p class="game-message" id="brainMessage">Pick difficulty. Tap card.</p>
        </aside>

        <div class="brain-stage">
          <div class="prompt-card">
            <p class="prompt-kicker" id="promptKicker">Math Sprint</p>
            <div class="prompt-text" id="brainPrompt">Ready?</div>
          </div>
          <div class="brain-controls" id="brainControls"></div>
        </div>
      </section>
    </main>
    <script src="../brain/game.js?v=28"></script>
  </body>
</html>
