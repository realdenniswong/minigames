<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>Sudoku</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="../shared/shell.css" />
  </head>
  <body>
    <main class="game-shell">
      <header class="panel-heading">
        <a class="nav-button" href="../../index.html">Library</a>
        <div class="title-block">
          <p class="eyebrow">quiet numbers</p>
          <h1>Sudoku</h1>
        </div>
      </header>

      <section class="game-layout game-screen">
        <div class="play-layout">
          <div class="board-panel">
            <div class="stat-grid">
              <div>
                <span>Time</span>
                <strong id="sudokuTimer">0</strong>
              </div>
            </div>
            <div class="sudoku-board" id="sudokuBoard" aria-label="Sudoku board"></div>
          </div>
          <aside class="side-panel">
            <div class="screen-controls">
              <label class="select-control">
                <span>Puzzle</span>
                <select id="sudokuDifficulty">
                  <option value="easy">Easy</option>
                  <option value="medium" selected>Medium</option>
                  <option value="hard">Hard</option>
                </select>
              </label>
              <button class="primary-button" type="button" id="newSudoku">New puzzle</button>
            </div>
            <div class="number-pad" id="numberPad" aria-label="Number pad"></div>
            <div class="control-row compact">
              <button type="button" id="noteSudoku" aria-pressed="false">Notes</button>
              <button type="button" id="eraseSudoku">Erase</button>
            </div>
            <p class="game-message" id="sudokuMessage">Select a blank cell, then choose a number.</p>
          </aside>
        </div>
      </section>
    </main>
    <script src="game.js"></script>
  </body>
</html>
